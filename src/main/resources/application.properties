server.port=${PORT:8080}

# JWT validation against Auth0 JWKS endpoint
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${AUTH0_DOMAIN:dipti-test.us.auth0.com}/
spring.security.oauth2.resourceserver.jwt.audiences=https://pizza42

# Auth0 tenant domain
auth0.domain=${AUTH0_DOMAIN:dipti-test.us.auth0.com}

# M2M credentials for Management API — set as environment variables
auth0.management.client-id=${AUTH0_MGMT_CLIENT_ID}
auth0.management.client-secret=${AUTH0_MGMT_CLIENT_SECRET}
