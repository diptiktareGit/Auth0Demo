<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120" width="440" height="120" role="img" aria-label="Pizza 42">
  <title>Pizza 42</title>

  <!-- ── Pizza slice icon ──────────────────────────────────────────── -->
  <g transform="translate(8,6)">
    <!-- cheese body of the slice (points down) -->
    <path d="M6 32 L98 32 L52 110 Z" fill="#f6b73c" stroke="#e0902a" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- crust band along the top -->
    <path d="M0 32 Q52 2 104 32 Q52 18 0 32 Z" fill="#d98a3a" stroke="#c2772b" stroke-width="2" stroke-linejoin="round"/>
    <!-- pepperoni -->
    <circle cx="40" cy="54" r="7.5" fill="#e63329"/>
    <circle cx="68" cy="58" r="6.5" fill="#e63329"/>
    <circle cx="53" cy="82" r="6.5" fill="#e63329"/>
    <!-- basil specks -->
    <circle cx="59" cy="51" r="3" fill="#3f7d2e"/>
    <circle cx="45" cy="74" r="3" fill="#3f7d2e"/>
  </g>

  <!-- ── Wordmark (system fonts — an SVG used as <img> can't load web fonts) ── -->
  <text x="128" y="78"
        font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="1"
        fill="#1a1a1a">PIZZA <tspan fill="#e63329">42</tspan></text>
</svg>
