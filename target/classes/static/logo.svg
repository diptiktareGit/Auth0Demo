<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <radialGradient id="crustGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="cheeseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- ── Pizza circle ─────────────────────────────────── -->
  <!-- Crust (outer ring) -->
  <circle cx="50" cy="50" r="46" fill="url(#crustGrad)" filter="url(#shadow)"/>
  <!-- Sauce -->
  <circle cx="50" cy="50" r="38" fill="#ef4444"/>
  <!-- Cheese -->
  <circle cx="50" cy="50" r="33" fill="url(#cheeseGrad)"/>

  <!-- Pepperoni toppings -->
  <circle cx="50" cy="32" r="5.5" fill="#dc2626"/>
  <circle cx="50" cy="32" r="4"   fill="#b91c1c"/>
  <circle cx="38" cy="52" r="5.5" fill="#dc2626"/>
  <circle cx="38" cy="52" r="4"   fill="#b91c1c"/>
  <circle cx="62" cy="52" r="5.5" fill="#dc2626"/>
  <circle cx="62" cy="52" r="4"   fill="#b91c1c"/>
  <circle cx="50" cy="62" r="5.5" fill="#dc2626"/>
  <circle cx="50" cy="62" r="4"   fill="#b91c1c"/>

  <!-- Slice cut lines -->
  <line x1="50" y1="4"  x2="50" y2="96" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="4"  y1="50" x2="96" y2="50" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="17" y1="17" x2="83" y2="83" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="83" y1="17" x2="17" y2="83" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>

  <!-- ── Text: Pizza ─────────────────────────────────── -->
  <text
    x="112" y="44"
    font-family="'Segoe UI', 'Arial Black', sans-serif"
    font-size="36"
    font-weight="800"
    letter-spacing="-1"
    fill="#111827">Pizza</text>

  <!-- ── Text: 42 (red accent) ───────────────────────── -->
  <text
    x="112" y="82"
    font-family="'Segoe UI', 'Arial Black', sans-serif"
    font-size="38"
    font-weight="900"
    letter-spacing="-2"
    fill="#ef4444">42</text>

  <!-- Underline accent under 42 -->
  <rect x="112" y="86" width="58" height="4" rx="2" fill="#ef4444"/>
</svg>
